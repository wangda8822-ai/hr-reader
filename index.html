function timeAgo(d) {
  const s = Math.floor((Date.now() - new Date(d).getTime()) / 1000);
  if (s < 3600) return Math.floor(s/60) + " 分钟前";
  if (s < 86400) return Math.floor(s/3600) + " 小时前";
  if (s < 604800) return Math.floor(s/86400) + " 天前";
  return new Date(d).toLocaleDateString("zh-CN", { month:"short", day:"numeric" });
}

function stripHtml(h) { const t = document.createElement("div"); t.innerHTML = h; return t.textContent || ""; }

function escHtml(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

function isSaved(article) { return state.savedArticles.some(a => a.link === article.link && a.title === article.title); }

// ── Fetch ──
async function fetchFeedViaRss2Json(feed) {
  const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(feed.url));
  const data = await res.json();
  if (data.status !== "ok" || !data.items) throw new Error("rss2json failed");
  return data.items.map(item => ({
    title: item.title,
    link: item.link,
    date: new Date(item.pubDate),
    snippet: stripHtml(item.description || "").slice(0, 220),
    source: feed.name, category: feed.category, color: feed.color, icon: feed.icon,
  }));
}

async function fetchFeedViaAllOrigins(feed) {
  const res = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(feed.url));
  const text = await res.text();
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, "text/xml");
  const items = xml.querySelectorAll("item");
  if (items.length === 0) {
    // try Atom format
    const entries = xml.querySelectorAll("entry");
    if (entries.length === 0) throw new Error("allorigins: no items");
    return Array.from(entries).map(e => ({
      title: e.querySelector("title")?.textContent || "",
      link: e.querySelector("link")?.getAttribute("href") || e.querySelector("link")?.textContent || "",
      date: new Date(e.querySelector("updated,published")?.textContent || Date.now()),
      snippet: stripHtml(e.querySelector("summary,content")?.textContent || "").slice(0, 220),
      source: feed.name, category: feed.category, color: feed.color, icon: feed.icon,
    }));
  }
  return Array.from(items).map(item => ({
    title: item.querySelector("title")?.textContent || "",
    link: item.querySelector("link")?.textContent || "",
    date: new Date(item.querySelector("pubDate")?.textContent || Date.now()),
    snippet: stripHtml(item.querySelector("description")?.textContent || "").slice(0, 220),
    source: feed.name, category: feed.category, color: feed.color, icon: feed.icon,
  }));
}

async function fetchSingleFeed(feed) {
  // 依次尝试多个代理
  try { return await fetchFeedViaRss2Json(feed); } catch {}
  try { return await fetchFeedViaAllOrigins(feed); } catch {}
  return null;
}

async function fetchFeeds() {
  setState({ loading: true });
  const all = [];
  const status = {};

  const promises = RSS_FEEDS.map(async feed => {
    const items = await fetchSingleFeed(feed);
    if (items && items.length > 0) {
      status[feed.name] = { ok: true, count: items.length };
      all.push(...items);
    } else {
      status[feed.name] = { ok: false };
    }
  });

  await Promise.all(promises);

  if (all.length > 0) {
    all.sort((a,b) => b.date - a.date);
    setState({ articles: all, feedStatus: status, usingDemo: false, loading: false, lastUpdated: new Date(), expandedIndex: null });
  } else {
    setState({ articles: DEMO_ARTICLES, feedStatus: status, usingDemo: true, loading: false, lastUpdated: new Date(), expandedIndex: null });
  }
}

// ── Render ──
function render() {
  const { articles, loading, activeCategory, searchQuery, savedArticles, showSaved, feedStatus, usingDemo, expandedIndex, lastUpdated } = state;

  const display = showSaved ? savedArticles : articles;
  const filtered = display.filter(a => {
    const cat = activeCategory === "all" || a.category === activeCategory;
    const q = searchQuery.toLowerCase();
    const search = !q || a.title.toLowerCase().includes(q) || a.source.toLowerCase().includes(q) || (a.snippet && a.snippet.toLowerCase().includes(q));
    return cat && search;
  });

  const stats = {};
  Object.keys(CATEGORIES).forEach(k => {
    stats[k] = k === "all" ? articles.length : articles.filter(a => a.category === k).length;
  });

  let html = `
  <div class="header">
    <div class="header-inner">
      <div class="header-top">
        <div>
          <div class="logo-area">
            <div class="logo-icon">HR</div>
            <div class="logo-text">脉搏阅读器</div>
          </div>
          <div class="logo-subtitle">来自 ${RSS_FEEDS.length} 个顶级 HR 博客的 ${articles.length} 篇文章${usingDemo ? " · 演示模式" : ""}</div>
        </div>
        <div class="header-actions">
          <button class="btn ${showSaved ? 'active' : ''}" onclick="setState({showSaved:!state.showSaved})">★ 收藏夹 (${savedArticles.length})</button>
          <button class="btn" onclick="fetchFeeds()" ${loading ? 'disabled' : ''}>${loading ? "⟳ 加载中..." : "⟳ 刷新"}</button>
        </div>
      </div>

      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" type="text" placeholder="搜索文章标题、主题或来源..." value="${escHtml(searchQuery)}" oninput="setState({searchQuery:this.value})" />
      </div>

      <div class="categories">
        ${Object.entries(CATEGORIES).map(([k, v]) => `
          <button class="cat-btn ${activeCategory===k && !showSaved ? 'active' : ''}" onclick="setState({activeCategory:'${k}',showSaved:false})">
            <span>${v.emoji}</span><span>${v.label}</span><span class="cat-count">${stats[k]}</span>
          </button>
        `).join("")}
      </div>
    </div>
  </div>

  <div class="content">`;

  if (usingDemo) {
    html += `<div class="demo-notice"><strong>📡 演示模式</strong> — 由于网络限制，暂时无法连接 RSS 源。当前展示的是精选示例文章。部署到 GitHub Pages 后将自动拉取全部 10 个 HR 博客的实时内容。</div>`;
  }

  if (loading) {
    html += `<div class="loading"><div class="spinner"></div><p class="loading-text">正在从 ${RSS_FEEDS.length} 个 HR 博客获取最新内容...</p></div>`;
  } else if (filtered.length === 0) {
    html += `<div class="empty"><p class="empty-icon">🔍</p><p class="empty-text">${showSaved ? "还没有收藏任何文章，点击 ☆ 即可收藏。" : "没有找到匹配的文章，请尝试其他关键词。"}</p></div>`;
  } else {
    html += `<div class="article-list">`;
    filtered.forEach((a, i) => {
      const expanded = expandedIndex === i;
      const saved = isSaved(a);
      html += `
      <div class="article-card ${expanded ? 'expanded' : ''}" onclick="setState({expandedIndex: state.expandedIndex===${i} ? null : ${i}})">
        <div class="article-inner">
          <div class="source-icon" style="background:${a.color}18;border:1px solid ${a.color}30">${a.icon}</div>
          <div class="article-body">
            <div class="article-meta">
              <span class="meta-source" style="color:${a.color}">${escHtml(a.source)}</span>
              <span class="meta-dot">·</span>
              <span class="meta-time">${timeAgo(a.date)}</span>
              <span class="meta-cat">${CATEGORIES[a.category]?.label || a.category}</span>
            </div>
            <h3 class="article-title">${escHtml(a.title)}</h3>
            ${a.snippet ? `<p class="article-snippet">${escHtml(a.snippet)}</p>` : ""}
            ${expanded ? `
              <div class="article-actions">
                <a class="btn-read" href="${escHtml(a.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">阅读原文 ↗</a>
                <button class="btn-save ${saved ? 'saved' : ''}" onclick="event.stopPropagation();toggleSave(state.${showSaved ? 'savedArticles' : 'articles'}[${showSaved ? state.savedArticles.indexOf(a) : articles.indexOf(a)}] || filtered_cache[${i}])">${saved ? "★ 已收藏" : "☆ 收藏"}</button>
              </div>
            ` : ""}
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;

    // Store filtered for save toggling
    window.filtered_cache = filtered;
  }

  // Sources panel
  html += `
    <div class="sources-panel">
      <h3 class="sources-title">已订阅来源</h3>
      <div class="sources-grid">
        ${RSS_FEEDS.map(f => {
          const s = feedStatus[f.name];
          const statusClass = s?.ok ? "status-ok" : usingDemo ? "status-demo" : "status-fail";
          return `<div class="source-item">
            <span class="source-item-icon">${f.icon}</span>
            <span class="source-item-name">${escHtml(f.name)}</span>
            <span class="source-status ${statusClass}"></span>
          </div>`;
        }).join("")}
      </div>
    </div>`;

  if (lastUpdated) {
    html += `<div class="update-bar">上次更新：${lastUpdated.toLocaleString("zh-CN")} · 每次打开页面自动刷新</div>`;
  }

  html += `</div>`; // close content

  document.getElementById("app").innerHTML = html;
}

// Fix save toggling - use filtered_cache
window.toggleSave = function(article) {
  if (!article) return;
  toggleSave_inner(article);
};
const toggleSave_inner = toggleSave;
window.toggleSave = function(article) {
  if (!article) return;
  let saved = [...state.savedArticles];
  const idx = saved.findIndex(a => a.link === article.link && a.title === article.title);
  if (idx >= 0) saved.splice(idx, 1); else saved.push(article);
  localStorage.setItem("hr_saved", JSON.stringify(saved));
  setState({ savedArticles: saved });
};

// Boot
fetchFeeds();
</script>
</body>
</html>
