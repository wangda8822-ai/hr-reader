<style>
  :root{--bg:#0B0E11;--bg-header:#141921;--gold:#D4A574;--gold-dark:#8B6F47;--gold-light:#F2DCC4;--text:#E8E6E1;--text-title:#F0EDE8;--text-muted:#7C8290;--text-dim:#6B7280;--text-meta:#9CA3AF;--border:rgba(255,255,255,0.06);--border-light:rgba(255,255,255,0.08);--surface:rgba(255,255,255,0.04);--surface-hover:rgba(255,255,255,0.025);--sans:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;--serif:'Noto Serif SC',Georgia,serif}
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--serif);-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
  .header{background:linear-gradient(180deg,var(--bg-header),var(--bg));border-bottom:1px solid var(--border);padding:28px 0 20px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
  .header-inner{max-width:960px;margin:0 auto;padding:0 24px}
  .header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
  .logo-area{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .logo-icon{width:38px;height:38px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--bg);font-family:var(--sans)}
  .logo-text{font-size:23px;font-weight:700;font-family:var(--sans);background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.02em}
  .logo-subtitle{font-size:13px;color:var(--text-dim);font-family:var(--sans)}
  .header-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border-light);background:var(--surface);color:var(--text-meta);cursor:pointer;font-size:13px;font-family:var(--sans);font-weight:600;transition:all .2s;white-space:nowrap}
  .btn:hover{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.06)}.btn.active{border-color:var(--gold);background:rgba(212,165,116,.12);color:var(--gold)}.btn:disabled{opacity:.5;cursor:not-allowed}
  .search-wrap{margin-top:18px;position:relative}
  .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text-dim);pointer-events:none}
  .search-input{width:100%;padding:12px 16px 12px 40px;border-radius:10px;border:1px solid var(--border-light);background:var(--surface);color:var(--text);font-size:14px;font-family:var(--sans);outline:none;transition:border-color .2s}
  .search-input:focus{border-color:rgba(212,165,116,.4)}.search-input::placeholder{color:var(--text-dim)}
  .categories{display:flex;gap:6px;margin-top:16px;overflow-x:auto;padding-bottom:4px}.categories::-webkit-scrollbar{height:0}
  .cat-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border-light);background:transparent;color:var(--text-dim);cursor:pointer;font-size:12px;font-family:var(--sans);font-weight:600;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:6px}
  .cat-btn.active{border-color:var(--gold);background:rgba(212,165,116,.12);color:var(--gold)}
  .cat-count{padding:1px 7px;border-radius:10px;font-size:11px;background:rgba(255,255,255,.06)}.cat-btn.active .cat-count{background:rgba(212,165,116,.2)}
  .content{max-width:960px;margin:0 auto;padding:24px 24px 60px}
  .notice{padding:14px 18px;border-radius:10px;margin-bottom:20px;background:rgba(212,165,116,.08);border:1px solid rgba(212,165,116,.15);font-size:13px;color:var(--gold);font-family:var(--sans);line-height:1.7}
  .loading{text-align:center;padding:80px 0}
  .spinner{width:48px;height:48px;margin:0 auto 20px;border:3px solid var(--border);border-top:3px solid var(--gold);border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{color:var(--text-dim);font-family:var(--sans);font-size:14px}
  .empty{text-align:center;padding:80px 0;color:var(--text-dim)}.empty-icon{font-size:40px;margin-bottom:12px}.empty-text{font-family:var(--sans);font-size:15px}
  .article-list{display:flex;flex-direction:column;gap:2px}
  .article-card{padding:20px 22px;border-radius:12px;border:1px solid transparent;transition:all .25s ease;cursor:pointer}
  .article-card:hover{background:var(--surface-hover)}.article-card.expanded{background:var(--surface);border-color:var(--border-light)}
  .article-inner{display:flex;gap:16px;align-items:flex-start}
  .source-icon{width:44px;height:44px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;margin-top:2px}
  .article-body{flex:1;min-width:0}
  .article-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
  .meta-source{font-size:11px;font-weight:700;font-family:var(--sans);letter-spacing:.02em}
  .meta-dot{color:#3A3F47;font-size:11px}.meta-time{font-size:11px;color:var(--text-dim);font-family:var(--sans)}
  .meta-cat{font-size:10px;padding:2px 8px;border-radius:6px;background:var(--surface);border:1px solid var(--border);color:var(--text-meta);font-family:var(--sans);font-weight:600}
  .article-title{margin:0 0 4px;font-size:17px;font-weight:600;line-height:1.5;color:var(--text-title);font-family:var(--serif)}
  .article-origin{margin:0 0 6px;font-size:12.5px;line-height:1.4;color:rgba(255,255,255,.3);font-family:var(--sans)}
  .article-snippet{margin:0;font-size:13.5px;color:var(--text-muted);line-height:1.65;font-family:var(--sans);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .article-card.expanded .article-snippet{display:block;-webkit-line-clamp:unset;overflow:visible}
  .article-origin-snippet{margin:4px 0 0;font-size:12px;color:rgba(255,255,255,.25);line-height:1.5;font-family:var(--sans)}
  .translating-hint{font-size:11px;color:var(--text-dim);font-family:var(--sans);font-style:italic;margin-top:4px}
  .article-actions{display:flex;gap:10px;margin-top:14px;animation:fadeIn .2s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .btn-read{padding:8px 18px;border-radius:8px;background:linear-gradient(135deg,var(--gold),#B8895A);color:var(--bg);font-size:12px;font-family:var(--sans);font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:6px;border:none;cursor:pointer}
  .btn-save{padding:8px 16px;border-radius:8px;border:1px solid var(--border-light);background:var(--surface);color:var(--text-meta);cursor:pointer;font-size:12px;font-family:var(--sans);font-weight:600}.btn-save.saved{border-color:var(--gold);background:rgba(212,165,116,.12);color:var(--gold)}
  .sources-panel{margin-top:40px;padding:20px 22px;border-radius:12px;background:rgba(255,255,255,.02);border:1px solid var(--border)}
  .sources-title{margin:0 0 14px;font-size:13px;font-weight:700;font-family:var(--sans);color:var(--text-dim);letter-spacing:.06em}
  .sources-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px}
  .source-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,.02)}
  .source-item-icon{font-size:16px}.source-item-name{font-size:12px;color:var(--text-meta);font-family:var(--sans);font-weight:500}
  .source-status{margin-left:auto;width:7px;height:7px;border-radius:50%}.status-ok{background:#4ADE80}.status-fail{background:#F87171}.status-demo{background:var(--text-dim)}
  .update-bar{text-align:center;padding:16px 0;margin-top:20px;font-size:12px;color:var(--text-dim);font-family:var(--sans)}
  .tbar{padding:10px 18px;border-radius:10px;margin-bottom:16px;background:rgba(212,165,116,.06);border:1px solid rgba(212,165,116,.12);font-size:12px;color:var(--gold);font-family:var(--sans);display:flex;align-items:center;gap:10px}
  @media(max-width:640px){.header-top{flex-direction:column;align-items:flex-start}.logo-text{font-size:20px}.article-title{font-size:15px}.source-icon{width:36px;height:36px;font-size:17px}.sources-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const RSS_FEEDS=[
  {name:"哈佛商业评论",url:"https://hbr.org/topic/human-resource-management?format=rss",category:"theory",color:"#C0392B",icon:"📕"},
  {name:"SHRM",url:"https://www.shrm.org/rss/pages/default.aspx",category:"theory",color:"#1B5E20",icon:"🏛"},
  {name:"Josh Bersin",url:"https://joshbersin.com/feed/",category:"tech",color:"#6A1B9A",icon:"🔮"},
  {name:"HR Bartender",url:"https://www.hrbartender.com/feed/",category:"culture",color:"#E65100",icon:"🍸"},
  {name:"AIHR",url:"https://www.aihr.com/blog/feed/",category:"tech",color:"#0277BD",icon:"📊"},
  {name:"HR Dive",url:"https://www.hrdive.com/feeds/news/",category:"talent",color:"#00695C",icon:"🌊"},
  {name:"Workology",url:"https://workology.com/feed/",category:"culture",color:"#AD1457",icon:"⚡"},
  {name:"People Managing People",url:"https://peoplemanagingpeople.com/feed/",category:"talent",color:"#37474F",icon:"👥"},
  {name:"HR Executive",url:"https://hrexecutive.com/feed/",category:"theory",color:"#4527A0",icon:"📰"},
  {name:"Talent Culture",url:"https://talentculture.com/feed/",category:"culture",color:"#F57F17",icon:"🌟"},
];
const CATS={all:{label:"全部主题",emoji:"📚"},theory:{label:"HR理论与战略",emoji:"🎯"},talent:{label:"人才管理与招聘",emoji:"🔍"},tech:{label:"HR科技与分析",emoji:"💡"},culture:{label:"敬业度与文化",emoji:"🤝"}};
const DEMO=[
  {title:"The Future of Strategic HR",source:"哈佛商业评论",category:"theory",color:"#C0392B",icon:"📕",date:new Date(Date.now()-36e5*2),link:"https://hbr.org",snippet:"As organizations face unprecedented change, HR leaders must evolve from traditional admin roles to strategic business partners.",title_zh:"战略人力资源的未来：从行政角色到业务伙伴",snippet_zh:"随着组织面临前所未有的变革，HR 领导者必须从传统行政角色转型为推动组织变革的战略业务伙伴。"},
  {title:"AI-Powered Recruiting: What Actually Works",source:"AIHR",category:"tech",color:"#0277BD",icon:"📊",date:new Date(Date.now()-36e5*5),link:"https://aihr.com",snippet:"A data-driven look at which AI recruiting tools deliver real results versus hype.",title_zh:"AI 驱动的招聘：哪些工具真正有效",snippet_zh:"基于 500 多个企业实施案例的数据分析，剖析哪些 AI 招聘工具能够带来真实成效。"},
  {title:"Building a Culture of Psychological Safety",source:"HR Bartender",category:"culture",color:"#E65100",icon:"🍸",date:new Date(Date.now()-36e5*8),link:"https://hrbartender.com",snippet:"Practical steps HR professionals can take to foster psychological safety.",title_zh:"构建心理安全感文化的实操指南",snippet_zh:"HR 从业者可以采取哪些具体步骤来培养工作场所的心理安全感？"},
  {title:"The Skills-Based Organization",source:"Josh Bersin",category:"theory",color:"#6A1B9A",icon:"🔮",date:new Date(Date.now()-36e5*12),link:"https://joshbersin.com",snippet:"Why leading companies are moving to skills-based talent models.",title_zh:"技能型组织：超越传统岗位体系",snippet_zh:"为什么领先企业正在打破传统岗位架构，转向基于技能的人才模型？"},
  {title:"Employee Engagement Drops to Five-Year Low",source:"SHRM",category:"culture",color:"#1B5E20",icon:"🏛",date:new Date(Date.now()-36e5*14),link:"https://shrm.org",snippet:"New research shows employee engagement has declined significantly.",title_zh:"员工敬业度降至五年最低",snippet_zh:"最新调研显示员工敬业度大幅下降。本文梳理了循证策略。"},
  {title:"Compensation Transparency Laws Guide",source:"HR Dive",category:"talent",color:"#00695C",icon:"🌊",date:new Date(Date.now()-36e5*18),link:"https://hrdive.com",snippet:"Pay transparency legislation is expanding rapidly worldwide.",title_zh:"薪酬透明法律全指南",snippet_zh:"随着薪酬透明立法快速扩展，HR 合规团队需要提前布局。"},
  {title:"People Analytics Maturity Model",source:"AIHR",category:"tech",color:"#0277BD",icon:"📊",date:new Date(Date.now()-36e5*22),link:"https://aihr.com",snippet:"A framework for assessing your people analytics capabilities.",title_zh:"人力分析成熟度模型",snippet_zh:"一套评估组织人力分析能力的框架。"},
  {title:"Remote Onboarding Lessons",source:"Workology",category:"talent",color:"#AD1457",icon:"⚡",date:new Date(Date.now()-36e5*26),link:"https://workology.com",snippet:"Survey data reveals what makes remote onboarding effective.",title_zh:"远程入职培训经验总结",snippet_zh:"调查揭示有效远程入职的关键因素。"},
  {title:"The CHRO's Evolving Role",source:"HR Executive",category:"theory",color:"#4527A0",icon:"📰",date:new Date(Date.now()-36e5*30),link:"https://hrexecutive.com",snippet:"CHROs are increasingly contributing to business strategy.",title_zh:"CHRO 在高管层中的角色演变",snippet_zh:"首席人力资源官越来越多地参与业务战略决策。"},
  {title:"Designing High-Performance Culture",source:"Talent Culture",category:"culture",color:"#F57F17",icon:"🌟",date:new Date(Date.now()-36e5*34),link:"https://talentculture.com",snippet:"Great culture doesn't happen by accident.",title_zh:"刻意设计高绩效团队文化",snippet_zh:"优秀的企业文化不是偶然形成的。"},
];

let state={articles:[],loading:true,activeCategory:"all",searchQuery:"",savedArticles:JSON.parse(localStorage.getItem("hr_saved")||"[]"),showSaved:false,feedStatus:{},usingDemo:false,expandedIndex:null,lastUpdated:null,showChinese:true,translatingTitles:false};
function setState(p){Object.assign(state,p);render()}

function timeAgo(d){const s=Math.floor((Date.now()-new Date(d).getTime())/1e3);if(s<3600)return Math.floor(s/60)+" 分钟前";if(s<86400)return Math.floor(s/3600)+" 小时前";if(s<604800)return Math.floor(s/86400)+" 天前";return new Date(d).toLocaleDateString("zh-CN",{month:"short",day:"numeric"})}
function stripHtml(h){const t=document.createElement("div");t.innerHTML=h;return t.textContent||""}
function escHtml(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function isSaved(a){return state.savedArticles.some(s=>s.link===a.link&&s.title===a.title)}
function isChinese(t){if(!t)return false;const c=t.match(/[\u4e00-\u9fff]/g);return c&&c.length>t.length*.15}

// ── Translation Cache ──
let tC={};try{tC=JSON.parse(localStorage.getItem("hr_trans")||"{}")}catch{tC={}}
function saveTC(){try{localStorage.setItem("hr_trans",JSON.stringify(tC))}catch{}}

// ── 翻译：MyMemory API ──
async function translateText(text){
  if(!text||text.length<3)return text;
  try{
    const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text.slice(0,500))}&langpair=en|zh-CN`);
    const d=await r.json();
    if(d.responseStatus===200&&d.responseData?.translatedText){
      let t=d.responseData.translatedText;
      if(t.includes("MYMEMORY WARNING")||t.includes("PLEASE NOTE"))return null;
      return t;
    }
  }catch{}
  return null;
}

// ── 批量翻译标题：把所有标题拼成一段，一次翻译 ──
async function translateTitlesBatch(){
  const arts=state.articles;
  const need=[];const needIdx=[];

  arts.forEach((a,i)=>{
    if(a.title_zh)return;
    const ck=a.link||a.title;
    if(tC[ck]?.t){a.title_zh=tC[ck].t;if(tC[ck].s)a.snippet_zh=tC[ck].s;return}
    if(isChinese(a.title)){a.title_zh=a.title;a.snippet_zh=a.snippet;return}
    need.push(a.title);needIdx.push(i);
  });

  if(!need.length){setState({articles:[...arts],translatingTitles:false});return}

  setState({translatingTitles:true});

  // 分批，每批 10 个标题拼成一段用 ||| 分隔
  const BS=10;
  for(let b=0;b<Math.ceil(need.length/BS);b++){
    const s=b*BS;
    const batch=need.slice(s,s+BS);
    const bi=needIdx.slice(s,s+BS);
    const joined=batch.join(" ||| ");

    const translated=await translateText(joined);
    if(translated){
      const parts=translated.split("|||").map(s=>s.trim());
      parts.forEach((p,j)=>{
        const idx=bi[j];
        if(idx!==undefined&&arts[idx]&&p){
          arts[idx].title_zh=p;
          const ck=arts[idx].link||arts[idx].title;
          if(!tC[ck])tC[ck]={};
          tC[ck].t=p;
        }
      });
    }
    setState({articles:[...arts]});
    if(b<Math.ceil(need.length/BS)-1) await new Promise(r=>setTimeout(r,500));
  }

  saveTC();
  setState({articles:[...arts],translatingTitles:false});
}

// ── 单条摘要翻译（点击展开时触发） ──
async function translateSnippet(articleIndex){
  const a=state.articles[articleIndex];
  if(!a||a.snippet_zh||isChinese(a.snippet)||!a.snippet)return;
  const ck=a.link||a.title;
  if(tC[ck]?.s){a.snippet_zh=tC[ck].s;setState({articles:[...state.articles]});return}
  const t=await translateText(a.snippet);
  if(t){
    a.snippet_zh=t;
    if(!tC[ck])tC[ck]={};tC[ck].s=t;saveTC();
    setState({articles:[...state.articles]});
  }
}

// ── RSS Fetch ──
async function fetchVia1(feed){const r=await fetch("https://api.rss2json.com/v1/api.json?rss_url="+encodeURIComponent(feed.url));const d=await r.json();if(d.status!=="ok"||!d.items)throw 0;return d.items.map(i=>({title:i.title,link:i.link,date:new Date(i.pubDate),snippet:stripHtml(i.description||"").slice(0,220),source:feed.name,category:feed.category,color:feed.color,icon:feed.icon}))}
async function fetchVia2(feed){const r=await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(feed.url));const t=await r.text();const x=new DOMParser().parseFromString(t,"text/xml");let items=x.querySelectorAll("item");if(!items.length){const e=x.querySelectorAll("entry");if(!e.length)throw 0;return Array.from(e).map(e=>({title:e.querySelector("title")?.textContent||"",link:e.querySelector("link")?.getAttribute("href")||"",date:new Date(e.querySelector("updated,published")?.textContent||Date.now()),snippet:stripHtml(e.querySelector("summary,content")?.textContent||"").slice(0,220),source:feed.name,category:feed.category,color:feed.color,icon:feed.icon}))}return Array.from(items).map(i=>({title:i.querySelector("title")?.textContent||"",link:i.querySelector("link")?.textContent||"",date:new Date(i.querySelector("pubDate")?.textContent||Date.now()),snippet:stripHtml(i.querySelector("description")?.textContent||"").slice(0,220),source:feed.name,category:feed.category,color:feed.color,icon:feed.icon}))}
async function fetchOne(f){try{return await fetchVia1(f)}catch{}try{return await fetchVia2(f)}catch{}return null}

async function fetchFeeds(){
  setState({loading:true});const all=[],status={};
  await Promise.all(RSS_FEEDS.map(async f=>{const items=await fetchOne(f);if(items&&items.length){status[f.name]={ok:true,count:items.length};all.push(...items)}else{status[f.name]={ok:false}}}));
  if(all.length>0){all.sort((a,b)=>b.date-a.date);setState({articles:all,feedStatus:status,usingDemo:false,loading:false,lastUpdated:new Date(),expandedIndex:null});if(state.showChinese)translateTitlesBatch()}
  else{setState({articles:DEMO,feedStatus:status,usingDemo:true,loading:false,lastUpdated:new Date(),expandedIndex:null})}
}

// ── Render ──
function render(){
  const{articles,loading,activeCategory,searchQuery,savedArticles,showSaved,feedStatus,usingDemo,expandedIndex,lastUpdated,showChinese,translatingTitles}=state;
  const display=showSaved?savedArticles:articles;
  const filtered=display.filter(a=>{
    const cat=activeCategory==="all"||a.category===activeCategory;
    const q=searchQuery.toLowerCase();
    return cat&&(!q||a.title.toLowerCase().includes(q)||a.source.toLowerCase().includes(q)||(a.snippet&&a.snippet.toLowerCase().includes(q))||(a.title_zh&&a.title_zh.includes(searchQuery))||(a.snippet_zh&&a.snippet_zh.includes(searchQuery)));
  });
  const stats={};Object.keys(CATS).forEach(k=>{stats[k]=k==="all"?articles.length:articles.filter(a=>a.category===k).length});

  let h=`<div class="header"><div class="header-inner"><div class="header-top"><div>
    <div class="logo-area"><div class="logo-icon">HR</div><div class="logo-text">脉搏阅读器</div></div>
    <div class="logo-subtitle">来自 ${RSS_FEEDS.length} 个顶级 HR 博客的 ${articles.length} 篇文章${usingDemo?" · 演示模式":""}</div>
  </div><div class="header-actions">
    <button class="btn ${showChinese?'active':''}" onclick="toggleTrans()">译 中文${translatingTitles?" ⟳":""}</button>
    <button class="btn ${showSaved?'active':''}" onclick="setState({showSaved:!state.showSaved})">★ 收藏 (${savedArticles.length})</button>
    <button class="btn" onclick="fetchFeeds()" ${loading?'disabled':''}>${loading?"⟳ 加载中...":"⟳ 刷新"}</button>
  </div></div>
  <div class="search-wrap"><span class="search-icon">⌕</span><input class="search-input" type="text" placeholder="搜索文章（支持中英文）..." value="${escHtml(searchQuery)}" oninput="setState({searchQuery:this.value})" /></div>
  <div class="categories">${Object.entries(CATS).map(([k,v])=>`<button class="cat-btn ${activeCategory===k&&!showSaved?'active':''}" onclick="setState({activeCategory:'${k}',showSaved:false})"><span>${v.emoji}</span><span>${v.label}</span><span class="cat-count">${stats[k]}</span></button>`).join("")}</div>
  </div></div><div class="content">`;

  if(usingDemo)h+=`<div class="notice"><strong>📡 演示模式</strong> — 部署到 Vercel 后将自动拉取实时内容并翻译为中文。</div>`;
  if(translatingTitles)h+=`<div class="tbar">🤖 正在批量翻译标题...</div>`;

  if(loading){h+=`<div class="loading"><div class="spinner"></div><p class="loading-text">正在获取最新内容...</p></div>`}
  else if(!filtered.length){h+=`<div class="empty"><p class="empty-icon">🔍</p><p class="empty-text">${showSaved?"还没有收藏文章。":"没有匹配的文章。"}</p></div>`}
  else{
    h+=`<div class="article-list">`;
    filtered.forEach((a,i)=>{
      const exp=expandedIndex===i,saved=isSaved(a),isEn=!isChinese(a.title),hasZhTitle=showChinese&&a.title_zh&&isEn;
      const hasZhSnippet=showChinese&&a.snippet_zh&&isEn;
      const mainTitle=hasZhTitle?a.title_zh:a.title;
      const mainSnippet=hasZhSnippet?a.snippet_zh:a.snippet;

      h+=`<div class="article-card ${exp?'expanded':''}" onclick="expandArticle(${i})"><div class="article-inner">
        <div class="source-icon" style="background:${a.color}18;border:1px solid ${a.color}30">${a.icon}</div>
        <div class="article-body">
          <div class="article-meta"><span class="meta-source" style="color:${a.color}">${escHtml(a.source)}</span><span class="meta-dot">·</span><span class="meta-time">${timeAgo(a.date)}</span><span class="meta-cat">${CATS[a.category]?.label||a.category}</span></div>
          <h3 class="article-title">${escHtml(mainTitle)}</h3>
          ${hasZhTitle?`<p class="article-origin">${escHtml(a.title)}</p>`:""}
          ${mainSnippet?`<p class="article-snippet">${escHtml(mainSnippet)}</p>`:""}
          ${hasZhSnippet&&exp?`<p class="article-origin-snippet">${escHtml(a.snippet)}</p>`:""}
          ${showChinese&&isEn&&!a.snippet_zh&&exp?`<p class="translating-hint">⏳ 正在翻译摘要...</p>`:""}
          ${exp?`<div class="article-actions"><a class="btn-read" href="${escHtml(a.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">阅读原文 ↗</a><button class="btn-save ${saved?'saved':''}" onclick="event.stopPropagation();doSave(${i})">${saved?"★ 已收藏":"☆ 收藏"}</button></div>`:""}
        </div></div></div>`;
    });
    h+=`</div>`;window._filtered=filtered;
  }

  h+=`<div class="sources-panel"><h3 class="sources-title">已订阅来源</h3><div class="sources-grid">${RSS_FEEDS.map(f=>{const s=feedStatus[f.name];const sc=s?.ok?"status-ok":usingDemo?"status-demo":"status-fail";return`<div class="source-item"><span class="source-item-icon">${f.icon}</span><span class="source-item-name">${escHtml(f.name)}</span><span class="source-status ${sc}"></span></div>`}).join("")}</div></div>`;
  if(lastUpdated)h+=`<div class="update-bar">上次更新：${lastUpdated.toLocaleString("zh-CN")} · 翻译已缓存，下次秒开</div>`;
  h+=`</div>`;
  document.getElementById("app").innerHTML=h;
}

// ── 展开文章时触发摘要翻译 ──
window.expandArticle=function(i){
  const newIdx=state.expandedIndex===i?null:i;
  setState({expandedIndex:newIdx});
  // 如果展开了，并且需要翻译摘要
  if(newIdx!==null&&state.showChinese){
    const filtered=window._filtered;
    if(filtered&&filtered[i]){
      const a=filtered[i];
      const realIdx=state.articles.findIndex(x=>x.link===a.link&&x.title===a.title);
      if(realIdx>=0)translateSnippet(realIdx);
    }
  }
};

window.doSave=function(fi){const a=window._filtered?.[fi];if(!a)return;let s=[...state.savedArticles];const x=s.findIndex(v=>v.link===a.link&&v.title===a.title);if(x>=0)s.splice(x,1);else s.push({...a});localStorage.setItem("hr_saved",JSON.stringify(s));setState({savedArticles:s})};
window.toggleTrans=function(){const nv=!state.showChinese;setState({showChinese:nv});if(nv&&!state.usingDemo&&state.articles.some(a=>!a.title_zh&&!isChinese(a.title)))translateTitlesBatch()};

fetchFeeds();
</script>
</body>
</html>
